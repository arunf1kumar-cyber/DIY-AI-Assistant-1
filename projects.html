<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - DIY AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">DIY AI Assistant</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="components.html">Components</a>
        <a href="ai-chat.html">AI Chat</a>
    </nav>
</header>

<section class="hero">
    <h1>📁 Projects</h1>
    <p>Create and manage your DIY AI projects</p>
</section>

<section>

    <div class="cards">

        <!-- Add Project Form -->
        <div class="card" style="text-align:left;">
            <h3>Create New Project</h3>

            <input id="projectName" type="text" placeholder="Project Name">
            <input id="projectDesc" type="text" placeholder="Project Description">

            <button onclick="createProject()">Add Project</button>
        </div>

    </div>

    <h2>My Projects</h2>

    <div class="cards" id="projectList">
        <!-- Projects will appear here -->
    </div>

</section>

<footer>
    <p>© 2026 DIY AI Assistant</p>
</footer>

<script src="script.js"></script>

<script>
function createProject() {
    let name = document.getElementById("projectName").value;
    let desc = document.getElementById("projectDesc").value;

    if (!name || !desc) {
        alert("Please fill all fields");
        return;
    }

    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    projects.push({
        name: name,
        desc: desc
    });

    localStorage.setItem("projects", JSON.stringify(projects));

    document.getElementById("projectName").value = "";
    document.getElementById("projectDesc").value = "";

    loadProjects();
}

function loadProjects() {
    let container = document.getElementById("projectList");
    let projects = JSON.parse(localStorage.getItem("projects")) || [];

    container.innerHTML = "";

    projects.forEach((p, index) => {
        container.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <p>${p.desc}</p>
                <button onclick="deleteProject(${index})">Delete</button>
            </div>
        `;
    });
}

function deleteProject(index) {
    let projects = JSON.parse(localStorage.getItem("projects")) || [];
    projects.splice(index, 1);
    localStorage.setItem("projects", JSON.stringify(projects));
    loadProjects();
}

window.onload = loadProjects;
</script>

</body>
</html>
