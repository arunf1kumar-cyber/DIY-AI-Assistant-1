<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Components - DIY AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">DIY AI Assistant</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="components.html">Components</a>
        <a href="ai-chat.html">AI Chat</a>
    </nav>
</header>

<section class="hero">
    <h1>🧩 Components</h1>
    <p>Manage your DIY hardware parts</p>
</section>

<section>

    <div class="cards">

        <!-- Add Component Form -->
        <div class="card" style="text-align:left;">
            <h3>Add New Component</h3>

            <input id="compName" type="text" placeholder="Component Name">
            <input id="compDesc" type="text" placeholder="Component Description">

            <button onclick="addComponent()">Add Component</button>
        </div>

    </div>

    <h2>My Components</h2>

    <div class="cards" id="componentList">
        <!-- Components appear here -->
    </div>

</section>

<footer>
    <p>© 2026 DIY AI Assistant</p>
</footer>

<script src="script.js"></script>

<script>
function addComponent() {
    let name = document.getElementById("compName").value;
    let desc = document.getElementById("compDesc").value;

    if (!name || !desc) {
        alert("Please fill all fields");
        return;
    }

    let components = JSON.parse(localStorage.getItem("components")) || [];

    components.push({
        name: name,
        desc: desc
    });

    localStorage.setItem("components", JSON.stringify(components));

    document.getElementById("compName").value = "";
    document.getElementById("compDesc").value = "";

    loadComponents();
}

function loadComponents() {
    let container = document.getElementById("componentList");
    let components = JSON.parse(localStorage.getItem("components")) || [];

    container.innerHTML = "";

    components.forEach((c, index) => {
        container.innerHTML += `
            <div class="card">
                <h3>${c.name}</h3>
                <p>${c.desc}</p>
                <button onclick="deleteComponent(${index})">Delete</button>
            </div>
        `;
    });
}

function deleteComponent(index) {
    let components = JSON.parse(localStorage.getItem("components")) || [];
    components.splice(index, 1);
    localStorage.setItem("components", JSON.stringify(components));
    loadComponents();
}

window.onload = loadComponents;
</script>

</body>
</html>
