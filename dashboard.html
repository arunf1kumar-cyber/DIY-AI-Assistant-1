<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DIY AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">DIY AI Assistant</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="components.html">Components</a>
        <a href="ai-chat.html">AI Chat</a>
    </nav>
</header>

<section class="hero">
    <h1>📊 Dashboard</h1>
    <p>Your AI Assistant control center</p>
</section>

<section>

    <h2>Overview</h2>

    <div class="cards">

        <div class="card">
            <h3>Total Projects</h3>
            <p id="projectCount">0</p>
        </div>

        <div class="card">
            <h3>Total Components</h3>
            <p id="componentCount">0</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p>Active System</p>
        </div>

    </div>

</section>

<section>

    <h2>Quick Actions</h2>

    <div class="cards">

        <div class="card">
            <h3>New Project</h3>
            <button onclick="location.href='projects.html'">Go</button>
        </div>

        <div class="card">
            <h3>Add Component</h3>
            <button onclick="location.href='components.html'">Go</button>
        </div>

        <div class="card">
            <h3>Open AI Chat</h3>
            <button onclick="location.href='ai-chat.html'">Go</button>
        </div>

    </div>

</section>

<footer>
    <p>© 2026 DIY AI Assistant</p>
</footer>

<script src="script.js"></script>

<script>
function loadDashboard() {
    let projects = JSON.parse(localStorage.getItem("projects")) || [];
    let components = JSON.parse(localStorage.getItem("components")) || [];

    document.getElementById("projectCount").innerText = projects.length;
    document.getElementById("componentCount").innerText = components.length;
}

window.onload = loadDashboard;
</script>

</body>
</html>
